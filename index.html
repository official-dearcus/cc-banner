  @font-face{ font-family:'GmarketSans'; font-weight:700;
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff'); font-display:swap; }

  :root{
    --ink:#1c1b22; --ink-soft:#54525f; --line:#e5e2ec; --paper:#f6f4f0; --panel:#fff;
    --accent:#5b3fd6; --accent-weak:#efeafb; --err:#c0392b;
    --shadow:0 1px 2px rgba(28,27,34,.04), 0 8px 30px rgba(28,27,34,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:Pretendard,system-ui,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
  .app{display:grid;grid-template-columns:400px minmax(0,1fr) 290px;grid-template-rows:56px 1fr;
    grid-template-areas:"top top top" "left center right";height:100vh}
  header.top{grid-area:top;display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--panel);border-bottom:1px solid var(--line)}
  header.top .logo{font-family:'Playfair Display',serif;font-weight:500;font-size:19px}
  header.top .logo b{color:var(--accent)}
  header.top .tag{font-size:12px;color:var(--ink-soft);padding:3px 9px;border:1px solid var(--line);border-radius:999px}
  header.top .spacer{flex:1}
  header.top #statusline{font-size:12px;color:var(--ink-soft)}
  .col{overflow-y:auto;padding:18px}
  .left{grid-area:left;background:var(--panel);border-right:1px solid var(--line)}
  .center{grid-area:center;display:flex;flex-direction:column;align-items:center;gap:12px;padding:18px 20px}
  .right{grid-area:right;background:var(--panel);border-left:1px solid var(--line)}
  .block{margin-bottom:18px}
  .block>label.h{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:9px}
  .num{display:inline-grid;place-items:center;width:16px;height:16px;border-radius:5px;background:var(--accent-weak);color:var(--accent);font-size:10px;font-weight:700}
  input[type=text],input[type=date],input[type=url]{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:13px;background:#fff;outline:none;color:var(--ink)}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  input.bad{border-color:var(--err);box-shadow:0 0 0 3px #fdecea}
  .row{display:flex;gap:8px}.row>*{flex:1;min-width:0}
  .hint{font-size:11px;color:var(--ink-soft);margin-top:5px;line-height:1.5}
  .hint.err{color:var(--err)}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;padding:9px;border:1.5px solid var(--line);border-radius:9px;background:#fff;font:inherit;font-size:12px;cursor:pointer;color:var(--ink-soft)}
  .seg button.on{border-color:var(--accent);background:var(--accent-weak);color:var(--accent);font-weight:600}
  .swatches{display:flex;gap:8px}
  .tplcard{display:flex;gap:10px;align-items:center;border:1.5px solid var(--line);border-radius:11px;padding:8px;margin-bottom:8px;background:#fff;cursor:pointer;transition:.12s}
  .tplcard:hover{border-color:#cfc7ee}
  .tplcard.on{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  .tplprev{width:120px;height:151px;border-radius:6px;border:1px solid var(--line);flex:none;background:#f4f2f7}
  .tplmeta{min-width:0}
  .tplname{font-size:13px;font-weight:600;margin-bottom:3px}
  .tplcard.on .tplname{color:var(--accent)}
  .tpldesc{font-size:11px;color:var(--ink-soft);line-height:1.45}
  .corstbl{width:100%;border-collapse:collapse;margin-top:6px;font-size:11px}
  .corstbl td{padding:3px 4px;border-bottom:1px solid rgba(0,0,0,.06);vertical-align:top}
  .corstbl td:first-child{width:18px}
  .corstbl td:nth-child(2){width:44px;opacity:.75}
  .errdetail{font-size:11px;line-height:1.55;margin-top:5px;padding:6px 8px;background:rgba(0,0,0,.04);border-radius:6px;font-family:ui-monospace,monospace;word-break:break-all}
  details summary{cursor:pointer;font-size:11px;opacity:.8;margin-top:4px}
  .herogrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}

/* ---- §1.2.2 오류 코드 표준화 ----
   user: 요청자용 문구 / admin: 관리자용 상세 */
const ERR = {
  E101:{ user:"시트에 연결할 수 없습니다. 관리자에게 문의하세요.", admin:"HTTP 요청 실패 (네트워크/URL 오류)" },
  E102:{ user:"시트에 접근할 수 없습니다. 공유 설정을 확인해 주세요.", admin:"403/404 — 문서 미게시 또는 권한 없음" },
  E103:{ user:"시트 형식을 읽을 수 없습니다.", admin:"CSV 파싱 실패 또는 빈 응답" },
  E104:{ user:"브라우저 보안(CORS)에 막혀 시트를 읽지 못했습니다.", admin:"fetch 자체가 차단됨 — 응답 헤더 없음. 해당 URL이 CORS를 허용하지 않거나 file:// 에서 실행 중" },
  E110:{ user:"시트 탭을 찾을 수 없습니다.", admin:"gid/탭명 불일치" },
  E201:{ user:"필수 항목이 비어 있는 행이 있습니다.", admin:"필수 컬럼 누락" },
  E202:{ user:"가격이 숫자가 아닌 행이 있습니다.", admin:"숫자 타입 변환 실패" },
  E203:{ user:"이미지 주소 형식이 올바르지 않습니다.", admin:"URL 형식 위반 (http/https 아님)" },
  E204:{ user:"판매가가 정상가보다 큰 행이 있습니다.", admin:"salePrice > normalPrice" },
  E205:{ user:"시트에 필요한 열이 없습니다.", admin:"헤더에 필수 컬럼 없음" },
  E206:{ user:"허용되지 않은 값이 입력된 행이 있습니다.", admin:"enum 허용값 위반" },
  E301:{ user:"이 제품군에 사용할 템플릿이 없습니다.", admin:"TemplateMaster에 매핑 없음 또는 enabled=FALSE" },
  E302:{ user:"등록되지 않은 템플릿이 지정됐습니다.", admin:"templateId가 design.md에 없음" },
};
function mkErr(code, detail, row){
  const e=ERR[code]||{user:"알 수 없는 오류",admin:code};
  return { code, user:e.user, admin:e.admin+(detail?` — ${detail}`:""), row: row??null };
}

/* ---- 스키마 정의 (§1.2.1) ---- */
const SCHEMA = {
  ProductMaster: {
    required: ["groupKey","normalPrice","salePrice"],   // 제품명은 name 또는 name1 (아래에서 검증)
    columns: {
      groupKey:     { type:"string" },
      // 그룹 레벨 필드 — 시트에서 첫 행에만 적는 게 일반적이므로 행 단위로는 optional.
      // 대신 buildGroups()에서 그룹 단위로 검증한다.
      groupLabel:   { type:"string", group:true, optional:true },
      seriesTitle:  { type:"string", group:true, optional:true },   // 01 한글 헤딩
      optionTitleEn:{ type:"string", group:true, optional:true },   // 02 영문 헤딩
      heroUrl:      { type:"url",    group:true, optional:true },
      normalLabel:  { type:"string", group:true, optional:true, default:"정상가" },
      saleLabel:    { type:"string", group:true, optional:true, default:"혜택가" }, // 특가 / 라리홈 특가 등
      sortOrder:    { type:"number", optional:true },
      // 제품명 = 텍스트 노드 1개. 피그마에서 폭 안에서 자동 줄바꿈됨.
      // name 권장. 구 시트 호환을 위해 name1/name2 가 있으면 공백으로 합침.
      name:         { type:"string", optional:true },
      name1:        { type:"string", optional:true },
      name2:        { type:"string", optional:true },
      // 옵션 상세 — 0~N개 블록. 셀 안에서 줄바꿈(Alt+Enter)으로 구분.
      //   "1롤당 663원"                        -> 라벨 없는 한 줄
      //   "Color: 화이트 | 핑크 | 딥그린 | 블랙"  -> 라벨 + 값
      optionInfo:   { type:"attrs", optional:true },
      normalPrice:  { type:"number" },
      salePrice:    { type:"number" },
      thumbUrl:     { type:"url",    optional:true },
      badge:        { type:"enum", values:["none","renewal","new"], optional:true, default:"none" },
    }
  },
  TemplateMaster: {
    required: ["groupKey","templateId"],
    columns: {
      groupKey:      { type:"string" },
      templateId:    { type:"string" },   // bamboo500_01 | bamboo500_02
      templateLabel: { type:"string", optional:true },
      themes:        { type:"list",   optional:true },  // "pink,blue"
      // 히어로 타이틀은 템플릿마다 다름 (01=영문 세리프 / 02=한글 그라데이션)
      // 셀 안 줄바꿈(Alt+Enter)으로 2줄 지정
      heroTitle:     { type:"lines",  optional:true },
      bottomCopy:    { type:"string", optional:true },  // 02 하단 카피 바
      bottomCopyBold:{ type:"string", optional:true },  // 굵게 처리할 뒷부분
      previewUrl:    { type:"url",    optional:true },

      sortOrder:     { type:"number", optional:true },
    }
  },
  /* 히어로 이미지 라이브러리 — 템플릿마다 필요한 이미지 성격이 다름

    required: ["groupKey","url"],
    columns: {
      groupKey:   { type:"string" },
      templateId: { type:"string", optional:true },   // 비우면 해당 제품군 전체 템플릿에서 선택 가능
      label:      { type:"string", optional:true },

/* ---- CSV 파서 (따옴표/줄바꿈/콤마 처리) ---- */
function parseCSV(text){
  if(!text || !text.trim()) return [];
  const rows=[]; let row=[], cell="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(q){
      if(c==='"'&&n==='"'){ cell+='"'; i++; }
      else if(c==='"'){ q=false; }
      else cell+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(cell); cell=""; }
      else if(c==='\r'){ /* skip */ }
      else if(c==='\n'){ row.push(cell); rows.push(row); row=[]; cell=""; }
      else cell+=c;
    }
  }
  if(cell.length||row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r=>r.some(c=>String(c).trim()!==""));
}

/* ---- 옵션 상세 파서 ----
   셀 안 줄바꿈으로 블록 구분. "라벨: 값" 이면 라벨 있는 블록, 콜론 없으면 값만.
     "1롤당 663원"                        -> [{label:null, value:"1롤당 663원"}]
     "Color: 화이트 | 핑크\nSize: 170mm"   -> [{label:"Color",...},{label:"Size",...}] */
function parseAttrs(raw){
  const s=String(raw??"").trim();
  if(!s) return [];
  return s.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(line=>{
    const m=line.match(/^([^:：]{1,20})[:：]\s*(.+)$/);
    return m ? { label:m[1].trim(), value:m[2].trim() } : { label:null, value:line };
  });
}

/* ---- 타입 캐스팅/검증 ---- */
const isUrl = v => /^https?:\/\/[^\s]+$/i.test(String(v).trim());
function castValue(raw, def, colName, rowNo, errs){
  const v=String(raw??"").trim();
  if(v===""){
    if(def.optional) return def.default!==undefined?def.default:((def.type==="list"||def.type==="attrs"||def.type==="lines")?[]:"");
    errs.push(mkErr("E201",`${colName} 비어 있음`,rowNo)); return null;
  }
  switch(def.type){
    case "attrs": return parseAttrs(v);
    case "lines": return v.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
    case "number":{
      const n=Number(v.replace(/[,\s원]/g,""));
      if(!isFinite(n)){ errs.push(mkErr("E202",`${colName}="${v}"`,rowNo)); return null; }
      return n;
    }
    case "url":
      if(!isUrl(v)){ errs.push(mkErr("E203",`${colName}="${v}"`,rowNo)); return null; }
      return v;
    case "bool":
      return !/^(false|0|no|n|아니오|미사용)$/i.test(v);
    case "list":
      return v.split(/[,|]/).map(s=>s.trim()).filter(Boolean);
    case "enum":{
      const lv=v.toLowerCase();
      if(!def.values.includes(lv)){ errs.push(mkErr("E206",`${colName}="${v}" (허용: ${def.values.join("/")})`,rowNo)); return def.default; }
      return lv;
    }
    default: return v;
  }
}

/* ---- 시트 → 레코드 ---- */
function parseSheet(csvText, schemaName){
  const S=SCHEMA[schemaName], errs=[], out=[];
  const rows=parseCSV(csvText);
  if(!rows.length){ errs.push(mkErr("E103",`${schemaName} 빈 시트`)); return {rows:[],errors:errs}; }
  const header=rows[0].map(h=>String(h).trim());
  const missing=S.required.filter(c=>!header.includes(c));
  if(missing.length){ errs.push(mkErr("E205",`${schemaName} 누락 컬럼: ${missing.join(", ")}`)); return {rows:[],errors:errs}; }
  const idx={}; header.forEach((h,i)=>idx[h]=i);

  rows.slice(1).forEach((r,i)=>{
    const rowNo=i+2;   // 시트 실제 행번호 (헤더=1)
    const rec={}, rowErrs=[];
    for(const [col,def] of Object.entries(S.columns)){
      if(!(col in idx)){ rec[col]= def.default!==undefined?def.default:(def.type==="list"?[]:""); continue; }
      const v=castValue(r[idx[col]], def, col, rowNo, rowErrs);
      rec[col]=v;
    }
    if(schemaName==="ProductMaster"){
      // name 없으면 name1+name2 합성 (구 시트 호환)
      if(!rec.name) rec.name=[rec.name1,rec.name2].filter(Boolean).join(" ").trim();
      if(!rec.name) rowErrs.push(mkErr("E201","name (또는 name1) 비어 있음",rowNo));
    }
    if(schemaName==="ProductMaster" && rec.normalPrice!=null && rec.salePrice!=null
       && rec.salePrice>rec.normalPrice){
      rowErrs.push(mkErr("E204",`${rec.salePrice} > ${rec.normalPrice}`,rowNo));
    }
    if(rowErrs.length){ errs.push(...rowErrs); }
    else { rec._row=rowNo; out.push(rec); }
  });
  return { rows:out, errors:errs };
}

/* ---- §1.1.2 제품군 기준 조회 ---- */
function buildGroups(products, templates, knownTemplateIds, heroes){
  const errs=[], groups={};
  for(const p of products){
    const k=p.groupKey;
    if(!groups[k]) groups[k]={ key:k, label:"", seriesTitle:"", optionTitleEn:"",
                                heroUrl:"", normalLabel:"", saleLabel:"", templates:[], rows:[], heroes:[] };
    const g=groups[k];
    // group 레벨 필드: 첫 비어있지 않은 값 채택 (시트 비정규화 허용)
    for(const f of ["groupLabel","seriesTitle","optionTitleEn","heroUrl","normalLabel","saleLabel"]){
      const t = f==="groupLabel" ? "label" : f;
      if(!g[t] && p[f]) g[t]=p[f];
    }
    g.rows.push(p);
  }
  for(const g of Object.values(groups)){
    g.rows.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0) || a._row-b._row);
  }
  for(const t of templates){
    const g=groups[t.groupKey];
    if(!g) continue;                       // 제품 없는 템플릿은 무시
    if(t.enabled===false) continue;
    if(knownTemplateIds && !knownTemplateIds.includes(t.templateId)){
      errs.push(mkErr("E302",`templateId="${t.templateId}"`,t._row)); continue;
    }
    g.templates.push(t);
  }
  for(const g of Object.values(groups)){
    g.templates.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0) || a._row-b._row);
  }
  /* 히어로 라이브러리 매핑 */
  for(const h of (heroes||[])){
    const g=groups[h.groupKey];
    if(!g) continue;
    if(h.enabled===false) continue;
    if(h.templateId && knownTemplateIds && !knownTemplateIds.includes(h.templateId)){
      errs.push(mkErr("E302",`HeroMaster templateId="${h.templateId}"`,h._row)); continue;
    }
    g.heroes.push(h);
  }
  for(const g of Object.values(groups)){
    g.heroes.sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0) || a._row-b._row);
  }

  /* 그룹 레벨 검증 — 헤딩 필드는 '그 템플릿을 실제로 쓸 때만' 필수 (§1.2.1) */
  for(const g of Object.values(groups)){
    if(!g.label){
      errs.push(mkErr("E201",`groupKey="${g.key}" groupLabel 없음`));
      g.label=g.key;   // 표시용 폴백
    }
    if(!g.normalLabel) g.normalLabel="정상가";
    if(!g.saleLabel)   g.saleLabel="혜택가";
    if(!g.templates.length){
      errs.push(mkErr("E301",`groupKey="${g.key}"`));
      continue;
    }
    const uses01 = g.templates.some(t=>t.templateId.endsWith("_01"));
    const uses02 = g.templates.some(t=>t.templateId.endsWith("_02"));
    if(uses01 && !g.seriesTitle)
      errs.push(mkErr("E201",`groupKey="${g.key}" seriesTitle 없음 (템플릿 01에 필요)`));
    if(uses02 && !g.optionTitleEn)
      errs.push(mkErr("E201",`groupKey="${g.key}" optionTitleEn 없음 (템플릿 02에 필요)`));
  }
  return { groups, errors:errs };
}

/* ---- 시트 URL 빌더 (§1.1.1) ---- */
function sheetCsvUrl(docId, tabName){
  return `https://docs.google.com/spreadsheets/d/${docId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
}

if (typeof module!=="undefined") module.exports={ERR,SCHEMA,parseCSV,parseSheet,buildGroups,sheetCsvUrl,mkErr,isUrl,parseAttrs};

/* Apps Script 프록시로 이미지를 base64 로 받아 data: URI 로 로드.
   data: URI 는 동일 출처로 취급되어 캔버스를 오염시키지 않는다. */
let PROXY_ERR=null;   // 마지막 프록시 실패 사유 (진단용)
async function loadViaProxy(url){
  const base=($("#proxyUrl")?.value||"").trim();
  if(!base) throw new Error("프록시 URL 미입력");
  const full=base+(base.includes("?")?"&":"?")+"img="+encodeURIComponent(url);
  let r;
  try{ r=await fetch(full,{redirect:"follow"}); }
  catch(e){ throw new Error(`CORS/네트워크 차단 — ${e.name}: ${e.message}. 배포 시 액세스 권한이 '모든 사용자'인지 확인하세요.`); }
  if(!r.ok) throw new Error(`프록시 HTTP ${r.status} ${r.statusText}`);
  const txt=await r.text();
  if(/^\s*<!DOCTYPE|<html/i.test(txt))
    throw new Error("HTML이 반환됨 — 로그인 페이지로 보입니다. 배포 액세스 권한을 '모든 사용자'로 바꾸고 '새 배포'를 만드세요.");
  let j;
  try{ j=JSON.parse(txt); }catch(e){ throw new Error("JSON 아님: "+txt.slice(0,120)); }
  if(!j.ok) throw new Error(`[${j.code||"?"}] ${j.message||"프록시 오류"}`);
  if(!j.data) throw new Error("응답에 이미지 데이터 없음");
  return await loadImg(`data:${j.mime};base64,${j.data}`, true);
}

/* 이미지 로드 우선순위
   1) CORS 허용 직접 로드      → 오염 없음
   2) 프록시(설정된 경우)       → 오염 없음
   3) crossOrigin 없이 직접 로드 → 미리보기는 되나 오염(PNG 저장 불가) */
async function loadImgSmart(url){
  try{ const i=await loadImg(url,false); PROXY_ERR=null; return { img:i, tainted:false }; }catch(e){}
  if(($("#proxyUrl")?.value||"").trim()){
    try{ const i=await loadViaProxy(url); PROXY_ERR=null; return { img:i, tainted:false, viaProxy:true }; }
    catch(e){ PROXY_ERR=String(e.message||e); }   // 사유 보존 → 경고 패널에 노출
  }
  return { img: await loadImg(url,true), tainted:true };
}

/* fetch 실패 원인 구분:
   - CORS/네트워크 차단 → TypeError (status 조회 불가) → E104
   - 서버 응답은 왔는데 권한/부재 → E102
   - 그 외 HTTP 오류 → E101 */
async function safeFetch(url){
  let r;
  try{ r=await fetch(url,{redirect:"follow"}); }
  catch(e){ throw mkErr("E104",`${e.name}: ${e.message} @ ${url}`); }
  if(!r.ok) throw mkErr(r.status===403||r.status===404?"E102":"E101",`HTTP ${r.status} ${r.statusText} @ ${url}`);
  return r;
}
async function fetchCsv(url){
  const r=await safeFetch(url);
  const t=await r.text();
  if(/^\s*<!DOCTYPE|<html/i.test(t)) throw mkErr("E102",`HTML 반환 — 게시/공유 설정 확인 @ ${url}`);
  if(!t.trim()) throw mkErr("E103",`빈 응답 @ ${url}`);
  return t;
}

/* ---- 입력값 해석 (§1.1.1) ----
   아래 3가지를 모두 받아들인다:
     1) 게시 URL  : .../spreadsheets/d/e/2PACX-.../pubhtml
     2) 편집 URL  : .../spreadsheets/d/{docId}/edit
     3) 문서 ID   : {docId} 만
*/
function parseSheetInput(v){
  const s=String(v||"").trim();
  let m=s.match(/\/d\/e\/([A-Za-z0-9_-]+)/);
  if(m) return { mode:"pub", id:m[1] };
  m=s.match(/\/d\/([A-Za-z0-9_-]{20,})/);
  if(m) return { mode:"gviz", id:m[1] };
  if(/^2PACX-[A-Za-z0-9_-]+$/.test(s)) return { mode:"pub", id:s };
  if(/^[A-Za-z0-9_-]{20,}$/.test(s)) return { mode:"gviz", id:s };
  return null;
}
const pubHtmlUrl = id => `https://docs.google.com/spreadsheets/d/e/${id}/pubhtml`;
const pubCsvUrl  = (id,gid) => `https://docs.google.com/spreadsheets/d/e/${id}/pub?gid=${gid}&single=true&output=csv`;

/* 게시 문서의 탭 목록(이름→gid) 조회 — pubhtml 의 sheet-menu 파싱 */
async function fetchPubTabs(id){
  const r=await safeFetch(pubHtmlUrl(id));
  const html=await r.text();
  const map={};
  const re=/sheet-button-(\d+)"[^>]*>\s*<a[^>]*>([^<]+)<\/a>/g;
  let m; while((m=re.exec(html))) map[m[2].trim()]=m[1];
  if(!Object.keys(map).length){
    // 탭이 1개면 sheet-menu 가 없음 → gid=0 단일
    if(/<table/i.test(html)) return { _single:"0" };
    throw mkErr("E103","pubhtml 에서 탭 목록을 찾지 못했습니다");
  }
  return map;
}
async function fetchPubTabCsv(id, tabs, name){
  const gid = tabs[name] ?? (tabs._single && Object.keys(tabs).length===1 ? tabs._single : null);
  if(gid==null) throw mkErr("E110",`"${name}" 탭 없음 (게시된 탭: ${Object.keys(tabs).filter(k=>k[0]!=="_").join(", ")})`);
  return fetchCsv(pubCsvUrl(id,gid));
}
function rowsToCsv(header,rows){
  const esc=v=>`"${String(v??"").replace(/"/g,'""')}"`;
  return [header.map(esc).join(","), ...rows.map(r=>r.map(esc).join(","))].join("\n");
}

async function syncSheet(){
  const btn=$("#syncBtn"); btn.disabled=true; btn.textContent="불러오는 중…";
  try{
    let pCsv,tCsv,hCsv="";
    if(src.mode==="csv" && src.csv==="manual"){
      const uP=$("#urlP").value.trim(), uT=$("#urlT").value.trim(), uH=$("#urlH").value.trim();
      if(!uP||!uT) throw mkErr("E101","ProductMaster / TemplateMaster CSV URL을 입력하세요");
      pCsv=await fetchCsv(uP);
      tCsv=await fetchCsv(uT);
      if(uH){ try{ hCsv=await fetchCsv(uH); }catch(e){ hCsv=""; } }
    } else if(src.mode==="csv"){
      const inp=parseSheetInput($("#docId").value);
      if(!inp) throw mkErr("E101","문서 ID 또는 게시 URL을 입력하세요");
      const nP=$("#tabP").value.trim()||"ProductMaster";
      const nT=$("#tabT").value.trim()||"TemplateMaster";
      const nH=$("#tabH").value.trim()||"HeroMaster";
      if(inp.mode==="pub"){
        const tabs=await fetchPubTabs(inp.id);
        pCsv=await fetchPubTabCsv(inp.id,tabs,nP);
        tCsv=await fetchPubTabCsv(inp.id,tabs,nT);
        try{ hCsv=await fetchPubTabCsv(inp.id,tabs,nH); }catch(e){ hCsv=""; }
      } else {
        pCsv=await fetchCsv(sheetCsvUrl(inp.id,nP));
        tCsv=await fetchCsv(sheetCsvUrl(inp.id,nT));
        try{ hCsv=await fetchCsv(sheetCsvUrl(inp.id,nH)); }catch(e){ hCsv=""; }
      }
    } else {
      const u=$("#gasUrl").value.trim();
      if(!u) throw mkErr("E101","Apps Script URL 미입력");
      const r=await fetch(u,{redirect:"follow"});
      if(!r.ok) throw mkErr(r.status===401||r.status===403?"E102":"E101",`HTTP ${r.status}`);
      const j=await r.json();
      if(!j.ok) throw mkErr(j.code||"E101", j.message||"Apps Script 오류");
      pCsv=rowsToCsv(j.ProductMaster.header, j.ProductMaster.rows);
      tCsv=rowsToCsv(j.TemplateMaster.header, j.TemplateMaster.rows);
      if(j.HeroMaster && j.HeroMaster.header.length) hCsv=rowsToCsv(j.HeroMaster.header, j.HeroMaster.rows);
    }
    const P=parseSheet(pCsv,"ProductMaster");
    const T=parseSheet(tCsv,"TemplateMaster");
    const H=hCsv?parseSheet(hCsv,"HeroMaster"):{rows:[],errors:[]};
    const B=buildGroups(P.rows,T.rows,KNOWN_TPL,H.rows);
    const errs=[...P.errors,...T.errors,...H.errors,...B.errors];
    if(!Object.keys(B.groups).length){
      showSheetErrors(errs.length?errs:[mkErr("E103","유효한 제품 행 없음")]); return;
    }
    SHEET_GROUPS = applySheet(B.groups);
    src.syncedAt = new Date();
    saveCfg(); cfgHint(); srcState();
    const first=Object.keys(SHEET_GROUPS)[0];
    initGroups(); selectGroup(first);
    const hard = errs.filter(e=>e.code!=="E301");
    showSheetErrors(errs, hard.length?null:`동기화 완료 — 제품군 ${Object.keys(SHEET_GROUPS).length}개 · 옵션 ${P.rows.length}행`);
    srcHint();
  }catch(e){
    const err = e.code ? e : mkErr("E101", String(e.message||e));
    // 자동(pubhtml) 경로가 CORS로 막히면 → 직접 URL 모드로 전환 안내
    if(err.code==="E104" && src.mode==="csv" && src.csv==="auto"){
      $("#csvManual").click();
      showSheetErrors([err]);
      $("#sheetErr").insertAdjacentHTML("afterbegin",
        `<div class="warnbox warn"><b>[탭별 URL 직접]으로 전환했습니다</b>
         자동 탐색은 구글이 CORS를 막아 사용할 수 없습니다.<br/>
         <b>파일 → 공유 → 웹에 게시</b>에서 <b>탭을 하나씩 고르고 형식을 CSV</b>로 게시한 뒤,
         나오는 <code>...output=csv</code> 주소를 아래에 붙여넣으세요.</div>`);
      return;
    }
    showSheetErrors([err]);
  }finally{ btn.disabled=false; btn.textContent="시트 불러오기"; }
}

/* 이미지별 CORS 실측 — 캔버스가 요구하는 것과 동일한 조건(crossOrigin=anonymous)으로 확인 */
function probeCors(url){
  return new Promise(res=>{
    const t0=performance.now();
    const i=new Image(); i.crossOrigin="anonymous";
    const done=ok=>res({url, ok, ms:Math.round(performance.now()-t0)});
    i.onload=()=>done(true); i.onerror=()=>done(false);
    i.src=url+(url.includes("?")?"&":"?")+"_cc="+Date.now();   // 캐시 우회
  });
}
$("#corsTest").onclick=async()=>{
  const box=$("#proxyResult"), btn=$("#corsTest");
  const list=[];
  heroesForTpl().forEach(h=>list.push({tag:"히어로", url:h.url}));
  state.rows.forEach(r=>{ if(r.thumbUrl) list.push({tag:"썸네일", url:r.thumbUrl}); });
  if(!list.length){ box.innerHTML=`<div class="warnbox warn"><b>검사할 URL이 없습니다</b>시트에 이미지 URL을 넣고 불러오세요.</div>`; return; }
  btn.disabled=true; btn.textContent="검사 중…";
  box.innerHTML=`<div class="warnbox warn"><b>${list.length}개 검사 중…</b></div>`;
  const out=[];
  for(const it of list){ const r=await probeCors(it.url); out.push({...it, ...r}); }
  const okN=out.filter(o=>o.ok).length;
  const rows=out.map(o=>`<tr><td>${o.ok?"✅":"❌"}</td><td>${o.tag}</td>
      <td style="word-break:break-all">${esc(o.url.replace(/^https?:\/\/[^/]+/,""))}</td></tr>`).join("");

  // 프록시가 설정돼 있으면 직접 로드 실패는 치명적이지 않다 — 실제로 프록시로 되는지까지 확인
  const hasProxy=!!($("#proxyUrl").value||"").trim();
  let proxyOk=null;
  if(okN<out.length && hasProxy){
    try{ await loadViaProxy(out.find(o=>!o.ok).url); proxyOk=true; }
    catch(e){ proxyOk=false; PROXY_ERR=String(e.message||e); }
  }
  let kind,head,note;
  if(okN===out.length){
    kind="ok"; head="전부 CORS 통과 — PNG 저장 가능";
    note="프록시 없이 직접 로드됩니다.";
  } else if(proxyOk===true){
    kind="ok"; head=`직접 로드는 차단되지만 프록시로 해결됨 — PNG 저장 가능`;
    note="서버에 CORS 헤더가 없어 아래는 전부 ❌지만, 프록시가 중계하므로 저장에 문제 없습니다.";
  } else if(proxyOk===false){
    kind="err"; head="차단 + 프록시도 실패 — PNG 저장 불가";
    note=`프록시 오류: ${esc(PROXY_ERR||"")}`;
  } else {
    kind="err"; head=`직접 로드 차단 (${okN}/${out.length} 통과)`;
    note="서버가 CORS 헤더를 보내지 않습니다. <b>이미지 프록시 URL</b>을 설정하면 우회할 수 있습니다.";
  }
  box.innerHTML=`<div class="warnbox ${kind}"><b>${head}</b>
    <div style="margin-bottom:4px">${note}</div>
    <details><summary>파일별 직접 로드 결과 (${okN}/${out.length})</summary>
      <table class="corstbl">${rows}</table></details></div>`;
  btn.disabled=false; btn.textContent="이미지 CORS 진단";
};

/* ---- 히어로 이미지 라이브러리 (HeroMaster) ---- */
function heroesForTpl(){
  const g=G()[state.group];
  if(!g || !g.heroes || !state.tpl) return [];
  const tplId = `${state.group}_${state.tpl}`;
  const known = ["bamboo500_01","bamboo500_02"];
  return g.heroes.filter(h=>{
    if(!h.templateId) return true;                 // 공용
    if(h.templateId===tplId) return true;
    // 제품군 전용 템플릿이 아직 없으면 밤부 템플릿을 빌려 쓰는 중 → suffix로 매칭
    return h.templateId.endsWith("_"+state.tpl) && !known.includes(tplId);
  });
}
function renderHeroList(){
  const box=$("#heroList"), list=heroesForTpl();
  if(!list.length){ box.innerHTML=`<div class="tplempty">등록된 히어로 이미지가 없습니다. 시트 <b>HeroMaster</b> 탭에 추가하거나 직접 업로드하세요.</div>`; return; }
  box.innerHTML=`<div class="herogrid">`+list.map((h,i)=>`
    <div class="hero ${state.heroUrl===h.url?'on':''}" data-h="${i}" title="${esc(h.label||h.url)}">
      <img src="${esc(h.url)}" loading="lazy" onerror="this.classList.add('bad')"/>
      <span>${esc(h.label||("이미지 "+(i+1)))}</span>
    </div>`).join("")+`</div>`;
  box.querySelectorAll(".hero").forEach(el=>el.onclick=()=>{
    const h=heroesForTpl()[+el.dataset.h];
    pickHero(h.url);
  });
}
async function pickHero(url){
  try{
    const r=await loadImgSmart(url);
    state.hero=r.img; state.heroTainted=r.tainted;
    state.heroUrl=url; state.heroUpload=false;
    renderHeroList(); drawTplPreviews(); draw();
    status(r.tainted ? "적용됨 — 단 이 이미지는 CORS 미허용이라 PNG 저장이 막힙니다."
      : (r.viaProxy ? "히어로 이미지를 적용했습니다 (프록시 경유)." : "히어로 이미지를 적용했습니다."), r.tainted?1:0);
  }catch(e){
    state.hero=null; state.heroUrl=""; state.heroTainted=false;

function initGroups(){
  $("#group").innerHTML = Object.entries(G()).map(([k,g])=>

function selectGroup(key){
  state.group=key;
  const g=G()[key];
  // 하위 선택 초기화 (§2.1.1)
  state.tpl = g.templates[0] || null;
  state.theme = state.tpl ? Object.keys(themesForKey(key,state.tpl))[0] : null;
  // 셀러명·공구기간은 운영자 입력값(가변값)이므로 제품군을 바꿔도 유지한다.
  Object.assign(state,{
    seller: state.seller || g.seller || "",
    copy:g.copy||"", copyBold:g.copyBold||"", series:g.series||g.seriesTitle||"",
    rows:(g.rows||[]).map(r=>mkRow({...r,thumb:null,thumbSrc:""}))
  });
  applyTplDefaults();
  $("#group").value=key;
  $("#seller").value=state.seller;
  $("#copy").value=state.copy; $("#copyBold").value=state.copyBold; $("#series").value=state.series;
  renderTplList(); renderThemes(); renderRows(); syncTplUI(); renderHeroList(); draw();
  loadSheetImages();
}
function themesForKey(gk,tpl){
  const g=G()[gk], all=THEMES[tpl];
  const f=g && g.themeFilter && g.themeFilter[tpl];
  if(!f||!f.length) return all;
  const out={}; f.forEach(k=>{ if(all[k]) out[k]=all[k]; });
  return Object.keys(out).length?out:all;
}
/* 시트의 thumbUrl / heroUrl 자동 로드 (§리스크: URL 만료·CORS) */
async function loadSheetImages(){
  const g=G()[state.group]; if(!g) return;
  const fails=[];
  await Promise.all(state.rows.map(async r=>{
    if(!r.thumbUrl || r.thumb) return;
    try{ const x=await loadImgSmart(r.thumbUrl); r.thumb=x.img; r.thumbTainted=x.tainted; r.thumbSrc=r.thumbUrl; }
    catch(e){ fails.push(rowName(r)); }
  }));
  if(g.heroUrl && !state.hero){
    try{ const x=await loadImgSmart(g.heroUrl); state.hero=x.img; state.heroTainted=x.tainted; state.heroUpload=false; }
    catch(e){ fails.push("히어로"); }
  }
  if(fails.length) status(`이미지 ${fails.length}건 로드 실패: ${fails.slice(0,2).join(", ")}`,1);
  renderRows(); draw();
}
function applyTplDefaults(){
  const g=G()[state.group]; if(!g || !state.tpl) return;
  // 히어로 타이틀: 시트(TemplateMaster.heroTitle) 우선 → 내장 샘플 → 기존 입력 유지
  const st = g.titleByTpl && g.titleByTpl[state.tpl];
  if(st && st.length){ state.t1=st[0]||""; state.t2=st[1]||""; }
  else if(state.tpl==="02"){ state.t1=g.t1_02||g.t1||state.t1||""; state.t2=g.t2_02||g.t2||state.t2||""; }
  else { state.t1=g.t1||state.t1||""; state.t2=g.t2||state.t2||""; }
  // 하단 카피 (02)
  const sc = g.copyByTpl && g.copyByTpl[state.tpl];
  if(sc && (sc.c||sc.b)){ state.copy=sc.c||""; state.copyBold=sc.b||""; }
  $("#copy").value=state.copy; $("#copyBold").value=state.copyBold;
  state.series = state.tpl==="02" ? (g.optionTitleEn||g.series||"") : (g.seriesTitle||g.series||"");
  $("#t1").value=state.t1; $("#t2").value=state.t2; $("#series").value=state.series;
  const lab=$("#seriesLabel");
  if(lab) lab.textContent = state.tpl==="02" ? "옵션 제목 (영문)" : "시리즈 제목 (한글)";
}

function themesFor(tpl){

/* ---------- 카드 편집 ---------- */
/* 제품 카탈로그 = 시트(ProductMaster)의 해당 제품군 원본 목록 */
function catalog(){ const g=G()[state.group]; return (g&&g.rows)||[]; }
/* 시트 원본 가격 보존 → 되돌리기(§3.2) 기준 */
function mkRow(c){ return { ...c, optionInfo:(c.optionInfo||[]).map(a=>({...a})),
  thumb:c.thumb||null, thumbSrc:c.thumbSrc||"",
  _normal0: c._normal0 ?? c.normal, _sale0: c._sale0 ?? c.sale }; }
function rowKey(r){ return `${rowName(r)}|${r.normal}|${r.sale}`; }
function isAdded(c){ return state.rows.some(r=>rowKey(r)===rowKey(c)); }

let dragFrom=null;
const BADGE_LABEL={none:"",renewal:"리뉴얼",new:"NEW"};
function renderRows(){
  const box=$("#rows"); box.innerHTML="";
  $("#rowCount").textContent = state.rows.length ? `${state.rows.length}개` : "";
  state.rows.forEach((r,i)=>{
    const d=disc(r.normal,r.sale);
    const attrs=rowAttrs(r);
    const el=document.createElement("div"); el.className="rowcard"; el.dataset.i=i;
    const dirty = (r.normal!==r._normal0) || (r.sale!==r._sale0);
    el.innerHTML=`
      <div class="top">
        <span class="drag" title="끌어서 순서 변경">⠿</span>
        <span class="idx">${i+1}</span><span class="pct">${d!=null?d+"%":"—"}</span>
        <button class="mini" data-del="${i}" style="padding:3px 8px">삭제</button></div>
      <div class="ro">
        <img class="thumbprev" ${r.thumbSrc?`src="${r.thumbSrc}"`:""} />
        <div class="roinfo">
          <div class="roname">${esc(rowName(r))}</div>
          ${attrs.length?`<div class="roattr">${attrs.map(a=>a.label?`<b>${esc(a.label)}</b> ${esc(a.value)}`:esc(a.value)).join("<br/>")}</div>`:""}
          ${r.badge!=="none"?`<span class="robadge">${BADGE_LABEL[r.badge]}</span>`:""}
        </div>
      </div>
      <div class="prices">
        <div class="pf"><span>정상가</span>
          <input type="text" data-f="normal" data-i="${i}" value="${won(r.normal).replace('원','')}"/></div>
        <div class="pf"><span>판매가</span>
          <input type="text" data-f="sale" data-i="${i}" value="${won(r.sale).replace('원','')}"/></div>
      </div>
      ${dirty?`<button class="revert" data-rev="${i}">시트 값으로 되돌리기 (${won(r._normal0)} → ${won(r._sale0)})</button>`:""}
      <div class="rothumb"><button class="mini" data-thumb="${i}">썸네일 교체</button></div>`;
    box.appendChild(el);
  });

  /* --- 드래그 정렬 --- */
  box.querySelectorAll(".rowcard").forEach(el=>{
    const h=el.querySelector(".drag");
    h.onmousedown=()=>{ el.draggable=true; };
    el.ondragstart=e=>{ dragFrom=+el.dataset.i; el.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain",String(dragFrom)); };
    el.ondragend=()=>{ el.draggable=false; dragFrom=null;
      box.querySelectorAll(".rowcard").forEach(x=>x.classList.remove("dragging","over-t","over-b")); };
    el.ondragover=e=>{ if(dragFrom===null) return; e.preventDefault();
      const r=el.getBoundingClientRect(), after=(e.clientY-r.top)>r.height/2;
      el.classList.toggle("over-b",after); el.classList.toggle("over-t",!after); };
    el.ondragleave=()=>el.classList.remove("over-t","over-b");
    el.ondrop=e=>{
      e.preventDefault(); if(dragFrom===null) return;
      const r=el.getBoundingClientRect(), after=(e.clientY-r.top)>r.height/2;
      let to=+el.dataset.i + (after?1:0);
      const item=state.rows[dragFrom];
      state.rows.splice(dragFrom,1);
      if(dragFrom<to) to--;
      state.rows.splice(to,0,item);
      dragFrom=null; renderRows(); draw();
    };
  });

  /* --- 가격만 수정 가능 (§3.2) --- */
  box.querySelectorAll("input[data-f]").forEach(inp=>{
    const i=+inp.dataset.i, f=inp.dataset.f;
    inp.oninput=e=>{
      const r=state.rows[i];
      r[f]=parseNum(e.target.value);
      e.target.value=won(r[f]).replace("원","");
      const card=box.querySelectorAll(".rowcard")[i];
      const d=disc(r.normal,r.sale);
      card.querySelector(".pct").textContent=d!=null?d+"%":"—";
      draw();
    };
    inp.onchange=()=>renderRows();   // 되돌리기 버튼 노출 갱신
  });
  box.querySelectorAll("[data-rev]").forEach(b=>b.onclick=()=>{
    const r=state.rows[+b.dataset.rev];
    r.normal=r._normal0; r.sale=r._sale0; renderRows(); draw();
    status("시트 값으로 되돌렸습니다.");
  });
  box.querySelectorAll("[data-thumb]").forEach(b=>b.onclick=()=>pickThumb(+b.dataset.thumb));
  box.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{ state.rows.splice(+b.dataset.del,1); renderRows(); draw(); });
  renderPicker();
}
const esc=s=>String(s??"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");

/* --- 제품 선택 패널 (§2 제품 마스터에서 로드) --- */
function renderPicker(){
  const box=$("#picker"); if(box.hidden) return;
  const cat=catalog();
  const items=cat.map((c,i)=>{
    const added=isAdded(c), d=disc(c.normal,c.sale);
    return `<div class="pk ${added?'added':''}" data-c="${i}">
      <div class="pkname">${esc(rowName(c))}</div>
      <div class="pkmeta">${won(c.sale)} · ${d!=null?d+"%":"—"}${added?" · 이미 추가됨":""}</div></div>`;
  }).join("");
  box.innerHTML = (cat.length?items:`<div class="empty">이 제품군의 제품 목록이 없습니다.</div>`)
    + `<div class="pk custom" data-c="new"><div class="pkname">+ 빈 카드로 추가</div>
       <div class="pkmeta">직접 입력합니다</div></div>`;
  box.querySelectorAll(".pk").forEach(el=>el.onclick=()=>{
    const v=el.dataset.c;
    if(v==="new"){
      state.rows.push(mkRow({name:"신규 제품",optionInfo:[],normal:0,sale:0,badge:"none",thumbUrl:""}));
    } else {
      state.rows.push(mkRow(catalog()[+v]));
    }
    box.hidden=true; $("#addRow").textContent="+ 제품 추가";
    renderRows(); draw(); loadSheetImages();
  });
}
$("#addRow").onclick=()=>{
  const box=$("#picker"); box.hidden=!box.hidden;
  $("#addRow").textContent = box.hidden ? "+ 제품 추가" : "닫기";
  renderPicker();
};
function pickThumb(i){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f)return; const rd=new FileReader();
    rd.onload=async()=>{ try{ state.rows[i].thumb=await loadImg(rd.result,true); state.rows[i].thumbSrc=rd.result;
      renderRows(); draw(); }catch(e){ status("썸네일 로드 실패",1); } };
    rd.readAsDataURL(f); };
  inp.click();
}

/* 카드 높이는 제품명 줄 수에 따라 달라짐(피그마도 360/428 2종). 누적 계산. */
function cardTops(){
  const out=[]; let y=0;
  for(const r of state.rows){
    const h=cardMetrics(r, state.tpl==="01"?82:80).cardH - (state.tpl==="02"?6:0);
    out.push({top:y,h}); y+=h+20;
  }
  return {tops:out,total:y};
}
function canvasH(){
  const O=OPT[state.tpl]||OPT["01"];
  return SHARED.HERO_H + O.body.y + O.list.y + O.list.pad*2 + cardTops().total + 60;
}

function draw(){
  const W=SHARED.W, S=SHARED.SCALE;
  const c=$("#preview");
  if(!state.tpl){   // 템플릿 미등록 제품군
    c.width=W*S; c.height=600*S;
    const ctx=c.getContext("2d"); ctx.setTransform(S,0,0,S,0,0);
    ctx.fillStyle="#f2f0f6"; ctx.fillRect(0,0,W,600);
    ctx.fillStyle="#8a86a0"; ctx.textAlign="center"; ctx.font="500 28px Pretendard";
    ctx.fillText(G()[state.group].label+" 템플릿이 등록되지 않았습니다", W/2, 290);
    ctx.font="400 20px Pretendard";
    ctx.fillText("피그마에 템플릿을 추가한 뒤 design.md에 규격을 등록하세요.", W/2, 330);
    warnings(); return;
  }
  const H=canvasH(), th=TH();
  c.width=W*S; c.height=H*S;
  const ctx=c.getContext("2d"); ctx.setTransform(S,0,0,S,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=th.sectionBg||"#fff"; ctx.fillRect(0,0,W,H);

  state.tpl==="01" ? hero01(ctx,W,th) : hero02(ctx,W,th);

  // 옵션 섹션 (.fig 실측: 템플릿마다 배경·서체·컨테이너가 다름)
  const O=OPT[state.tpl];
  const oy=SHARED.HERO_H;
  const by=oy+O.body.y;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle = th.eyebrowColor || th.accent;
  ctx.font=`${O.eyebrow.weight} ${O.eyebrow.size}px ${O.eyebrow.font}`;
  ctx.fillText("option info.", W/2, by+O.eyebrow.lineH/2);
  ctx.fillStyle = O.heading.color || th.accent;
  ctx.font=`${O.heading.weight} ${O.heading.size}px ${O.heading.font}, Pretendard`;
  ctx.fillText(state.series||"", W/2, by+O.title.h-O.heading.lineH/2);
  ctx.textBaseline="alphabetic";

  const {tops,total}=cardTops();
  const listY=by+O.list.y, listX=O.body.x;
  if(O.list.bg){
    ctx.fillStyle=O.list.bg;
    ctx.fillRect(listX, listY, O.list.w, total-O.list.gap+O.list.pad*2);
  }
  const startY=listY+O.list.pad;
  const cardX=listX+O.list.pad;
  state.rows.forEach((r,i)=>{
    const top=startY+tops[i].top;
    state.tpl==="01" ? card01(ctx,r,cardX,top,th) : card02(ctx,r,cardX,top,th);
  });
  warnings();
}

/* ---- 히어로 02 : 그라데이션 배경 + 제품 누끼컷 + 한글 그라데이션 타이틀 + 카피바
   피그마 구조: main-img = 그라데이션 배경 프레임, 그 위에 제품 이미지가 얹힘.
   (사진을 cover로 깔고 그라데이션을 덮는 게 아님) ---- */
function hero02(ctx,W,th){
  const H=SHARED.HERO_H;
  // 그라데이션 배경 (141.81deg)
  const a=141.81*Math.PI/180, len=Math.abs(W*Math.cos(a))+Math.abs(H*Math.sin(a));
  const cx=W/2, cy=H/2, dx=Math.cos(a)*len/2, dy=Math.sin(a)*len/2;
  const g=ctx.createLinearGradient(cx-dx,cy-dy,cx+dx,cy+dy);
  g.addColorStop(0.0136,th.gradFrom); g.addColorStop(0.8337,th.gradTo);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // 제품 이미지 — 히어로 전체(860×1080)에 1:1 적용, 그라데이션 위에 얹힘
  // (.fig: main-img 의 IMAGE fill 이 프레임 전체를 채움)
  if(state.hero) clipRect(ctx,0,0,W,H,()=>cover(ctx,state.hero,0,0,W,H));

  const left=(W-751)/2;
  // 셀러 필(pill) — px20, gap16, rounded
  ctx.font=`400 28px Pretendard`; const sw=ctx.measureText(state.seller||"seller").width;
  ctx.font=`400 36px 'Playfair Display'`; const xw=ctx.measureText("×").width;
  const logoW=114, gap=16, inner=sw+gap+xw+gap+logoW, pw=inner+40, ph=PILL_H, py=100;
  ctx.fillStyle=th.pillBg; roundRect(ctx,left,py,pw,ph,ph/2); ctx.fill();
  ctx.textBaseline="middle"; ctx.textAlign="left"; ctx.fillStyle="#fff";
  let x=left+20, cy2=py+ph/2;
  ctx.font=`400 28px Pretendard`; ctx.fillText(state.seller||"seller",x,cy2); x+=sw+gap;
  ctx.font=`400 36px 'Playfair Display'`; ctx.fillText("×",x,cy2); x+=xw+gap;
  drawLogo(ctx,x,cy2,logoW,19);

  // 타이틀 — 그라데이션 텍스트, 좌측정렬, lineH80 gap8
  const ht=py+ph+40;
  ctx.textAlign="left";
  const lines=[[state.t1,400],[state.t2,700]].filter(l=>l[0]);
  lines.forEach((l,i)=>{
    const y=ht+i*88+40;
    const tg=ctx.createLinearGradient(left,0,left+751,0);
    tg.addColorStop(0,th.titleFrom); tg.addColorStop(1,th.titleTo);
    ctx.fillStyle=tg; ctx.font=`${l[1]} 80px Pretendard`;
    trk(ctx,l[0],left,y,-1.6,"left");
  });

  // 기간 텍스트
  const dy2=ht+(lines.length?lines.length*88-8:0)+40+17;
  ctx.fillStyle=th.dateText; ctx.font=`400 34px Pretendard`;
  trk(ctx,range02(state.d1,state.d2),left,dy2,-0.68,"left");

  // 카피 바
  ctx.fillStyle=th.accent; ctx.fillRect(0,1000,W,80);
  ctx.fillStyle="#fff";
  ctx.font=`400 32px Pretendard`; const w1=trkWidth(ctx,state.copy,-0.64);
  ctx.font=`700 32px Pretendard`; const w2=trkWidth(ctx,state.copyBold,-0.64);
  let bx2=(W-(w1+w2))/2;
  ctx.font=`400 32px Pretendard`; trk(ctx,state.copy,bx2,1041,-0.64,"left");
  ctx.font=`700 32px Pretendard`; trk(ctx,state.copyBold,bx2+w1,1041,-0.64,"left");
  ctx.textBaseline="alphabetic";
}

/* ---- 카드 01 : 원형 배지 + 라벨 2줄 가격 ----
   피그마 flex 모델: option(w342, h=cardH-72, y=top+36, flex-col gap36, justify-center)
     └ option_name-wrap (gap16): [badge 36] + option_box-top
     └ option_price-wrap (h82)
   ★ 제품명은 텍스트 노드 1개이고 txt_option 폭 안에서 자동 줄바꿈된다.
     (피그마 실측: card_01=2줄 / card_03·04=3줄) 줄바꿈을 하지 않으면 할인율 원과 겹친다. */
const NAME_W = { "01":250, "02":342 };   // 피그마 txt_option 폭
const ATTR_LH=30, ATTR_GAP=10;   // ⚠️ 라벨 있는 블록의 행높이/간격 — 피그마 미확인(추정)

/* 측정 전용 오프스크린 컨텍스트 */
const _mc = document.createElement("canvas").getContext("2d");

/* 폭 안에서 줄바꿈 — 공백 우선, 한 단어가 폭을 넘으면 글자 단위로 강제 분할 */
function wrapText(ctx, text, maxW, tracking){
  const t=String(text||"").trim();
  if(!t) return [];
  const words=t.split(/\s+/), lines=[]; let line="";
  const w=s=>trkWidth(ctx,s,tracking||0);
  for(const word of words){
    const test = line ? line+" "+word : word;
    if(w(test)<=maxW){ line=test; continue; }
    if(line){ lines.push(line); line=""; }
    if(w(word)<=maxW){ line=word; continue; }
    // 단어 자체가 폭 초과 -> 글자 단위 분할
    let cur="";
    for(const ch of word){
      if(w(cur+ch)>maxW && cur){ lines.push(cur); cur=ch; }
      else cur+=ch;
    }
    line=cur;
  }
  if(line) lines.push(line);
  return lines;
}
/* 제품명 줄 계산.
   - 셀 안 줄바꿈(Alt+Enter)은 **의도된 줄바꿈**으로 그대로 유지
   - 각 줄이 폭을 넘을 때만 자동으로 접음 → 어떤 경우에도 폭을 넘지 않음(원과 겹치지 않음) */
function nameLines(r){
  const nameW = NAME_W[state.tpl] || 250;
  _mc.font=`600 ${SHARED.name.size}px Pretendard`;
  const out=[];
  for(const para of String(rowName(r)||"").split(/\r?\n/)){
    const t=para.trim(); if(!t) continue;
    out.push(...wrapText(_mc, t, nameW, SHARED.name.tracking));
  }
  return out.length?out:[""];
}
function rowName(r){ return r.name || [r.n1,r.n2].filter(Boolean).join(" "); }

function attrsHeight(attrs){
  if(!attrs || !attrs.length) return 0;
  // 라벨 없는 단일 블록 = 밤부500 케이스 (피그마 검증값 36)
  if(attrs.length===1 && !attrs[0].label) return SHARED.unit.lineH;
  return attrs.reduce((a,b)=>a+(b.label?ATTR_LH:0)+ATTR_LH,0) + ATTR_GAP*(attrs.length-1);
}
function cardMetrics(r, priceH){
  const lns=nameLines(r);
  const lines=lns.length||1;
  const attrs=rowAttrs(r);
  const aH=attrsHeight(attrs);
  const txtH = lines*SHARED.name.lineH + (aH?10+aH:0);
  const boxTopH = Math.max(txtH, 80);
  const nameWrapH = (r.badge!=="none" ? 36+16 : 0) + boxTopH;
  const contentH = nameWrapH + 36 + priceH;
  // 피그마: 카드 1~4=360(콘텐츠 최대 296), 배지+3줄인 카드5는 428로 키움.
  // 콘텐츠가 360에 안 들어가면 피그마처럼 카드를 키운다.
  const cardH = Math.max(360, contentH + 64);
  return { lns, lines, attrs, aH, txtH, boxTopH, nameWrapH, contentH, cardH };
}
/* 시트 optionInfo(배열) 또는 구 unit(문자열) 모두 지원 */
function rowAttrs(r){
  if(Array.isArray(r.optionInfo)) return r.optionInfo;
  if(r.unit) return [{label:null, value:r.unit}];
  return [];
}
/* 옵션 상세 블록 렌더 → 끝난 y 반환 */
function drawAttrs(ctx, attrs, x, y){
  if(!attrs.length) return y;
  if(attrs.length===1 && !attrs[0].label){
    ctx.fillStyle=SHARED.textSub; ctx.font=`400 ${SHARED.unit.size}px Pretendard`;
    trk(ctx,attrs[0].value,x,y+SHARED.unit.lineH/2,SHARED.unit.tracking,"left");
    return y+SHARED.unit.lineH;
  }
  let cy=y;
  attrs.forEach((a,i)=>{
    if(a.label){
      ctx.fillStyle=SHARED.textStrong; ctx.font=`600 ${SHARED.unit.size}px Pretendard`;
      trk(ctx,a.label,x,cy+ATTR_LH/2,SHARED.unit.tracking,"left");
      cy+=ATTR_LH;
    }
    ctx.fillStyle=SHARED.textSub; ctx.font=`400 ${SHARED.unit.size}px Pretendard`;
    trk(ctx,a.value,x,cy+ATTR_LH/2,SHARED.unit.tracking,"left");
    cy+=ATTR_LH;
    if(i<attrs.length-1) cy+=ATTR_GAP;
  });
  return cy;
}
function card01(ctx,r,x0,top,th){
  const x=x0+10;
  const m=cardMetrics(r,82);
  const CW=OPT["01"].cardW, CH=m.cardH, OH=CH-72;
  ctx.fillStyle="#fff"; ctx.fillRect(x0,top,CW,CH);
  const T=SHARED.thumb;
  ctx.fillStyle=T.bg; ctx.fillRect(x,top+10,T.w,CH-20);
  if(r.thumb) contain(ctx,r.thumb,x+T.w*T.imgLeft/100,top+10+(CH-20)*T.imgTop/100,T.w*T.imgW/100,(CH-20)*T.imgH/100);
  else ph(ctx,x+T.w/2,top+CH/2);

  const ox=x+356, OW=342;
  let cy = top+36 + (OH-m.contentH)/2;      // justify-center

  if(r.badge!=="none"){
    const txt = r.badge==="renewal" ? "RENEWAL!" : "NEW!";
    ctx.strokeStyle=th.badgeBorder; ctx.lineWidth=2;
    roundRect(ctx,ox,cy,120,36,18); ctx.stroke();
    ctx.fillStyle=th.accent; ctx.font=`600 20px Pretendard`;
    ctx.textBaseline="middle"; trk(ctx,txt,ox+60,cy+18,-0.4,"center");
    cy+=36+16;
  }
  const boxTop=cy;
  ctx.textBaseline="middle"; ctx.fillStyle=SHARED.textStrong; ctx.font=`600 32px Pretendard`;
  m.lns.forEach((l,i)=>trk(ctx,l,ox,boxTop+i*40+20,-0.64,"left"));
  if(m.aH) drawAttrs(ctx, m.attrs, ox, boxTop+m.lines*40+10);
  // 할인 원
  const d=disc(r.normal,r.sale);
  ctx.fillStyle=th.circleBg; ctx.beginPath(); ctx.arc(ox+302,boxTop+40,40,0,7); ctx.fill();
  ctx.fillStyle="#fff"; ctx.font=`700 28px GmarketSans, Pretendard`;
  trk(ctx,d!=null?d+"%":"—",ox+302,boxTop+41,-0.56,"center");

  // 가격 2줄
  const py = boxTop + m.boxTopH + 36;
  const g=G()[state.group]||{};
  ctx.fillStyle=SHARED.textMuted; ctx.font=`600 20px Pretendard`;
  trk(ctx,g.normalLabel||"정상가",ox,py+18,-0.4,"left");
  ctx.font=`400 20px Pretendard`;
  const np=won(r.normal); trk(ctx,np,ox+OW,py+18,-0.4,"right");
  const npw=trkWidth(ctx,np,-0.4);
  ctx.strokeStyle=SHARED.textMuted; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(ox+OW-npw,py+18); ctx.lineTo(ox+OW,py+18); ctx.stroke();

  ctx.fillStyle=SHARED.textStrong; ctx.font=`600 28px Pretendard`;
  trk(ctx,g.saleLabel||"혜택가",ox,py+46+18,-0.56,"left");
  ctx.font=`700 28px Pretendard`;
  trk(ctx,won(r.sale),ox+OW,py+46+18,-0.56,"right");
  ctx.textBaseline="alphabetic";
  return CH;
}

/* ---- 카드 02 : 텍스트 배지 + 사각칩 + 인라인 가격 (라벨 없음) ---- */
function card02(ctx,r,x,top,th){
  const m=cardMetrics(r,80);
  const CW=OPT["02"].cardW, CH=m.cardH-6, OH=CH-72;
  ctx.fillStyle="#fff"; ctx.fillRect(x,top,CW,CH);
  ctx.strokeStyle=th.cardBorder; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x,top+CH-0.5); ctx.lineTo(x+CW,top+CH-0.5); ctx.stroke();

  const T=SHARED.thumb;
  ctx.fillStyle="#fff"; ctx.fillRect(x,top+7,T.w,CH-14);
  if(r.thumb) contain(ctx,r.thumb,x+T.w*T.imgLeft/100,top+7+(CH-14)*T.imgTop/100,T.w*T.imgW/100,(CH-14)*T.imgH/100);
  else ph(ctx,x+T.w/2,top+CH/2);

  const ox=x+T.w+36, OW=CW-T.w-36;
  let cy = top+36 + (OH-m.contentH)/2;

  ctx.textBaseline="middle";
  if(r.badge!=="none"){
    const txt = r.badge==="renewal" ? "★리뉴얼★" : "★NEW★";
    ctx.fillStyle=th.badgeText; ctx.font=`600 24px Pretendard`;
    trk(ctx,txt,ox,cy+18,-0.48,"left");
    cy+=36+16;
  }
  const boxTop=cy;
  ctx.fillStyle=SHARED.textStrong; ctx.font=`600 32px Pretendard`;
  m.lns.forEach((l,i)=>trk(ctx,l,ox,boxTop+i*40+20,-0.64,"left"));
  if(m.aH) drawAttrs(ctx, m.attrs, ox, boxTop+m.lines*40+10);

  // 가격줄: [칩 80] gap20 [혜택가] gap16 [정상가 취소선] — 라벨 없음
  const py = boxTop + m.boxTopH + 36;
  const d=disc(r.normal,r.sale);
  ctx.fillStyle=th.chipBg; ctx.fillRect(ox,py,80,80);
  ctx.fillStyle=th.chipText; ctx.font=`700 28px GmarketSans, Pretendard`;
  trk(ctx,d!=null?d+"%":"—",ox+40,py+41,-0.56,"center");

  let px=ox+80+20;
  ctx.fillStyle=SHARED.textStrong; ctx.font=`700 28px Pretendard`;
  const sp=won(r.sale); trk(ctx,sp,px,py+40,-0.56,"left");
  px+=trkWidth(ctx,sp,-0.56)+16;
  ctx.fillStyle=SHARED.textMuted; ctx.font=`400 20px Pretendard`;
  const np=won(r.normal); trk(ctx,np,px,py+40,-0.4,"left");
  const npw=trkWidth(ctx,np,-0.4);
  ctx.strokeStyle=SHARED.textMuted; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(px,py+40); ctx.lineTo(px+npw,py+40); ctx.stroke();
  ctx.textBaseline="alphabetic";
  return CH;
}

/* ---------- helpers ---------- */
function trkWidth(ctx,text,tracking){
  if(!text) return 0;
  const chars=[...text];
  return chars.reduce((a,c)=>a+ctx.measureText(c).width,0)+tracking*(chars.length-1);
}
function trk(ctx,text,x,y,tracking,align){
  if(!text) return;
  if(!tracking){ const sv=ctx.textAlign; ctx.textAlign=align; ctx.fillText(text,x,y); ctx.textAlign=sv; return; }
  const chars=[...text];
  const w=trkWidth(ctx,text,tracking);
  let cx = align==="center" ? x-w/2 : align==="right" ? x-w : x;
  const sv=ctx.textAlign; ctx.textAlign="left";
  for(const ch of chars){ ctx.fillText(ch,cx,y); cx+=ctx.measureText(ch).width+tracking; }
  ctx.textAlign=sv;
}
function drawLogo(ctx,x,cy,w,h){
  if(LOGO.img){ ctx.drawImage(LOGO.img, x, cy-h/2, w, h); return; }
  ctx.save(); ctx.fillStyle="#fff"; ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.font=`600 ${h}px 'Playfair Display'`; ctx.fillText("DEAR.CUS",x,cy); ctx.restore();
}
function cover(ctx,img,x,y,w,h){ const ir=img.width/img.height,r=w/h; let dw,dh,dx,dy;
  if(ir>r){dh=h;dw=h*ir;dx=x-(dw-w)/2;dy=y;} else {dw=w;dh=w/ir;dx=x;dy=y-(dh-h)/2;}
  ctx.drawImage(img,dx,dy,dw,dh); }
function contain(ctx,img,x,y,w,h){ const ir=img.width/img.height,r=w/h; let dw,dh;
  if(ir>r){dw=w;dh=w/ir;} else {dh=h;dw=h*ir;}
  ctx.drawImage(img,x+(w-dw)/2,y+(h-dh)/2,dw,dh); }
function ph(ctx,cx,cy){ ctx.fillStyle="rgba(120,110,105,.35)"; ctx.textAlign="center"; ctx.font="400 18px Pretendard";
  ctx.fillText("썸네일",cx,cy); }
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function clipRect(ctx,x,y,w,h,fn){ ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip(); fn(); ctx.restore(); }

/* ---------- 검증 ---------- */
function checkSeller(){
  const bad = state.tpl==="01" && state.seller && !LATIN.test(state.seller);
  $("#seller").classList.toggle("bad",bad);
  const h=$("#sellerHint");
  h.className="hint"+(bad?" err":"");
  h.innerHTML = bad
    ? "템플릿 01의 셀러명 서체(High Summit)에는 <b>한글 글리프가 없습니다</b>. 영문으로 바꾸거나 템플릿 02를 사용하세요."
    : (state.tpl==="01" ? "영문만 가능 (High Summit 손글씨체)" : "한글 가능 (Pretendard)");
  return !bad;
}
function warnings(){
  const w=[];
  if(!state.tpl){
    w.push(["err","템플릿 미등록",`${G()[state.group].label} 제품군에 등록된 템플릿이 없습니다.`]);
    $("#warnList").innerHTML=w.map(([k,t,m])=>`<div class="warnbox ${k}"><b>${t}</b>${m}</div>`).join("");
    $("#dlBtn").disabled=true; return false;
  }
  if(!state.hero) w.push(["warn", state.tpl==="02"?"제품 이미지 없음":"히어로 이미지 없음",
    state.tpl==="02"?"그라데이션만 표시됩니다.":"폴백 컬러로 표시됩니다."]);
  if(anyTainted()){
    const which=[state.heroTainted?"히어로":null, state.rows.some(r=>r.thumbTainted)?"썸네일":null].filter(Boolean).join("·");
    const detail = PROXY_ERR
      ? `<b>프록시가 실패했습니다:</b><div class="errdetail">${esc(PROXY_ERR)}</div>`
      : `→ <b>이미지 프록시 URL</b>을 설정하거나, CORS 허용 스토리지로 옮기거나, <b>직접 업로드</b>를 쓰세요.`;
    w.push(["err","PNG 저장 불가 — 이미지 CORS 미허용",
      `${which} 이미지 서버가 <b>Access-Control-Allow-Origin</b> 헤더를 주지 않습니다.<br/>${detail}`]);
  }
  if(state.tpl==="01" && state.seller && !LATIN.test(state.seller))
    w.push(["err","셀러명 한글","템플릿 01은 영문 전용입니다 (High Summit)."]);
  if(!state.seller) w.push(["warn","셀러명 미입력",""]);
  if(!state.d1||!state.d2) w.push(["warn","공구 기간 미입력",""]);
  else if(new Date(state.d2)<new Date(state.d1)) w.push(["err","기간 오류","종료일이 시작일보다 빠릅니다."]);
  state.rows.forEach((r,i)=>{
    if(r.sale>r.normal) w.push(["err",`카드 ${i+1} 가격 오류`,"판매가 > 정상가"]);
    if(!r.normal) w.push(["err",`카드 ${i+1} 정상가 없음`,""]);
  });
  if(!state.rows.length) w.push(["err","카드 없음",""]);
  if(!w.length) w.push(["ok","이상 없음","다운로드 준비 완료."]);
  $("#warnList").innerHTML=w.map(([k,t,m])=>`<div class="warnbox ${k}"><b>${t}</b>${m}</div>`).join("");
  const blocked=w.some(x=>x[0]==="err"); $("#dlBtn").disabled=blocked; return !blocked;
}
function status(m,e){ const el=$("#statusline"); el.textContent=m; el.style.color=e?"var(--err)":"var(--ink-soft)"; }

/* ---------- 다운로드 ---------- */
const safe=s=>String(s).replace(/[^\w가-힣]+/g,"-").replace(/^-+|-+$/g,"");
function fname(){ const p=(state.d1&&state.d2)?`${state.d1.replace(/-/g,"")}-${state.d2.replace(/-/g,"")}`:"nodate";
  return `${safe(G()[state.group].label)}_${state.tpl}_${state.theme}_${p}.png`; }
$("#dlBtn").onclick=()=>{ if(!warnings())return;
  try{ const a=document.createElement("a"); a.href=$("#preview").toDataURL("image/png");
    a.download=fname(); a.click(); pushHist(); status("다운로드 완료: "+fname()); }
  catch(e){ status("저장 실패 — 외부 이미지(CORS)일 수 있습니다.",1); } };

/* ---------- 이력 / 공유 ---------- */
const hist=[];
const snap=()=>({ group:state.group,tpl:state.tpl,theme:state.theme,seller:state.seller,t1:state.t1,t2:state.t2,
  d1:state.d1,d2:state.d2,copy:state.copy,copyBold:state.copyBold,series:state.series,
  rows:state.rows.map(r=>({name:rowName(r),optionInfo:rowAttrs(r),normal:r.normal,sale:r.sale,badge:r.badge,thumbUrl:r.thumbUrl||""})),
  at:new Date().toLocaleString("ko-KR") });
function pushHist(){ hist.unshift(snap()); renderHist(); }
function renderHist(){ const el=$("#histList");
  if(!hist.length){ el.innerHTML=`<div class="empty">다운로드하면 이력이 쌓입니다.</div>`; return; }
  el.innerHTML=hist.map((h,i)=>`<div class="hist" data-i="${i}"><div><b>${(G()[h.group]||{label:h.group}).label}</b> · ${h.tpl}/${h.theme}</div>
    <div class="s">${h.seller} · ${h.d1||"-"} ~ ${h.d2||"-"}<br/>${h.at}</div></div>`).join("");
  el.querySelectorAll(".hist").forEach(x=>x.onclick=()=>restore(hist[+x.dataset.i])); }
function restore(h){
  Object.assign(state,{ group:h.group,tpl:h.tpl,theme:h.theme,seller:h.seller,t1:h.t1,t2:h.t2,d1:h.d1,d2:h.d2,
    copy:h.copy,copyBold:h.copyBold,series:h.series, rows:h.rows.map(r=>mkRow({...r,thumb:null,thumbSrc:""})) });
  $("#group").value=h.group;
  $("#seller").value=h.seller; $("#t1").value=h.t1; $("#t2").value=h.t2;
  $("#d1").value=h.d1; $("#d2").value=h.d2; $("#copy").value=h.copy;
  $("#copyBold").value=h.copyBold; $("#series").value=h.series;
  renderTplList(); renderThemes(); renderRows(); syncTplUI(); dateHint(); draw(); status("이력에서 복구했습니다.");
}
$("#shareBtn").onclick=()=>{ const c=snap(); delete c.at;
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(c))));
  const url=location.origin+location.pathname+"?config="+encodeURIComponent(code);
  if(navigator.clipboard) navigator.clipboard.writeText(url);
  status("공유 URL 복사됨 (이미지 제외)"); };
function fromUrl(){ const p=new URLSearchParams(location.search).get("config"); if(!p)return;
  try{ const c=JSON.parse(decodeURIComponent(escape(atob(p)))); c.at=""; restore(c); }
  catch(e){ status("공유 코드 해석 실패",1); } }

/* ---------- 바인딩 ---------- */
$("#group").onchange=e=>selectGroup(e.target.value);
$("#seller").oninput=e=>{ state.seller=e.target.value.trim(); checkSeller(); drawTplPreviews(); draw(); saveCfg(); };
$("#t1").oninput=e=>{ state.t1=e.target.value; drawTplPreviews(); draw(); };
$("#t2").oninput=e=>{ state.t2=e.target.value; drawTplPreviews(); draw(); };
$("#copy").oninput=e=>{ state.copy=e.target.value; draw(); };
$("#copyBold").oninput=e=>{ state.copyBold=e.target.value; draw(); };
$("#series").oninput=e=>{ state.series=e.target.value; draw(); };
function dateHint(){ const h=$("#dateHint");
  if(state.d1&&state.d2&&new Date(state.d2)<new Date(state.d1)){ h.textContent="종료일이 시작일보다 빠릅니다."; h.className="hint err"; }
  else { h.textContent = state.tpl==="01"?range01(state.d1,state.d2):range02(state.d1,state.d2); h.className="hint"; } }
$("#d1").onchange=e=>{ state.d1=e.target.value; dateHint(); draw(); saveCfg(); };
$("#d2").onchange=e=>{ state.d2=e.target.value; dateHint(); draw(); saveCfg(); };
$("#heroUpload").onclick=()=>$("#heroFile").click();
$("#heroFile").onchange=e=>{ const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=async()=>{ try{ state.hero=await loadImg(r.result,true);
    state.heroSrc=r.result; state.heroUrl=""; state.heroUpload=true; state.heroTainted=false; renderHeroList(); drawTplPreviews(); draw(); }catch(x){ status("이미지 로드 실패",1); } };
  r.readAsDataURL(f); };
$("#heroReset").onclick=()=>{ state.hero=null; state.heroSrc=""; state.heroUrl=""; state.heroUpload=false; state.heroTainted=false; renderHeroList(); drawTplPreviews(); draw(); };
$("#zoom").oninput=e=>{ const v=+e.target.value; $("#zoomVal").textContent=v+"%";
  $("#preview").style.width=(SHARED.W*v/100)+"px"; $("#preview").style.height="auto"; };

/* ---------- 시작 ---------- */
async function boot(){
  const today=new Date(), end=new Date(Date.now()+6*864e5);
  const iso=d=>d.toISOString().slice(0,10);
  state.d1=iso(today); state.d2=iso(end);
  $("#d1").value=state.d1; $("#d2").value=state.d2;

  cfgProbe();
  let cfg=loadCfg();   // 저장된 접속 설정 복원 (있으면 기본값보다 우선)
  if(!cfg && PRESET && PRESET.csv && PRESET.csv.ProductMaster){
    // 저장된 게 없으면 배포 기본값 사용
    $("#urlP").value=PRESET.csv.ProductMaster||"";
    $("#urlT").value=PRESET.csv.TemplateMaster||"";
    $("#urlH").value=PRESET.csv.HeroMaster||"";
    $("#proxyUrl").value=PRESET.proxy||"";
    cfg={ mode:"csv", csv:"manual", urlP:PRESET.csv.ProductMaster, _preset:true };
  }
  cfgHint();

  try{ LOGO.img=await loadImg(LOGO.src,true); }catch(e){ /* 텍스트 폴백 */ }

  initGroups(); dateHint();
  $("#zoom").dispatchEvent(new Event("input"));
  draw();
  try{
    await Promise.all([
      document.fonts.load("400 44px 'High Summit'"),
      document.fonts.load("400 80px 'Playfair Display'"),
      document.fonts.load("600 32px Pretendard"),
      document.fonts.load("700 28px Pretendard"),
      document.fonts.load("700 28px GmarketSans")
    ]);
    await document.fonts.ready;
    status("준비됨");
  }catch(e){ status("일부 폰트 로드 실패 — 대체 서체로 표시될 수 있습니다.",1); }
  draw(); drawTplPreviews(); fromUrl();

  // 저장된 설정이 있으면 데이터 소스를 복원하고 자동으로 불러온다
  if(cfg && cfg.mode && cfg.mode!=="sample"){
    if(cfg.seller){ state.seller=cfg.seller; $("#seller").value=cfg.seller; }
    if(cfg.d1){ state.d1=cfg.d1; $("#d1").value=cfg.d1; }
    if(cfg.d2){ state.d2=cfg.d2; $("#d2").value=cfg.d2; }
    dateHint();
    const b=$("#srcSeg").querySelector(`[data-s="${cfg.mode}"]`);
    if(b) b.click();
    if(cfg.mode==="csv" && cfg.csv==="manual") $("#csvManual").click();
    const hasInput = (cfg.mode==="gas" && cfg.gasUrl) || (cfg.csv==="manual" ? cfg.urlP : cfg.docId);
    if(hasInput){ status(cfg._preset?"시트를 불러오는 중…":"저장된 설정으로 불러오는 중…"); await syncSheet(); }
  }
  srcState();
}
boot();
</script>
</body>
</html>
